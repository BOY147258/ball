<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C投篮训练助手 - AI篮球投篮分析</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
    <meta name="description" content="AI篮球投篮训练助手 - 实时检测进球、统计命中率、投篮热力图">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23ff7a00'/><path d='M50 5 L50 95 M5 50 L95 50 M15 20 Q50 50 15 80 M85 20 Q50 50 85 80' stroke='%23fff' stroke-width='3' fill='none'/></svg>">

    <!-- AI 模型 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675471989/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="app-header">
        <div class="header-left">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#ff7a00"/>
                    <path d="M50 5 L50 95 M5 50 L95 50" stroke="#fff" stroke-width="3" fill="none"/>
                    <path d="M20 25 Q50 50 20 75" stroke="#fff" stroke-width="3" fill="none"/>
                    <path d="M80 25 Q50 50 80 75" stroke="#fff" stroke-width="3" fill="none"/>
                </svg>
            </div>
            <h1>C投篮训练</h1>
        </div>
        <div class="header-right">
            <div id="loadingStatus" class="loading-status">加载中...</div>
            <button id="helpBtn" class="btn-icon" title="帮助">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </button>
            <button id="fullscreenBtn" class="btn-icon" title="全屏">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="app-main">
        <!-- 视频区域 -->
        <section class="video-section">
            <div class="video-wrapper">
                <video id="video" playsinline autoplay muted></video>
                <canvas id="overlayCanvas"></canvas>

                <!-- 状态横幅 -->
                <div id="statusBanner" class="status-banner">点击下方按钮开启摄像头</div>

                <!-- 投篮检测动画 -->
                <div id="shotIndicator" class="shot-indicator hidden">
                    <span id="shotIcon"></span>
                    <span id="shotText"></span>
                </div>

                <!-- 加载状态 -->
                <div id="loadingOverlay" class="loading-overlay hidden">
                    <div class="spinner"></div>
                    <p id="loadingText">准备中...</p>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="controls">
                <button id="cameraBtn" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    开启摄像头
                </button>
                <select id="cameraSelect" class="select" disabled>
                    <option value="">选择摄像头</option>
                </select>
                <button id="switchCameraBtn" class="btn btn-secondary" disabled title="切换摄像头">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 3h5v5M8 3H3v5M3 16v5h5M21 16v5h-5"/>
                    </svg>
                </button>
                <label for="fileInput" class="btn btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传视频
                </label>
                <input type="file" id="fileInput" accept="video/*" style="display:none;">
                <button id="setHoopBtn" class="btn btn-secondary" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                    标记篮筐
                </button>
            </div>
        </section>

        <!-- 侧边栏 -->
        <aside class="side-panel">
            <!-- 统计数据 -->
            <div class="stats-card">
                <h2>投篮统计</h2>
                <div class="stats-grid">
                    <div class="stat-box hit">
                        <div class="stat-value" id="statHit">0</div>
                        <div class="stat-label">命中</div>
                    </div>
                    <div class="stat-box miss">
                        <div class="stat-value" id="statMiss">0</div>
                        <div class="stat-label">投失</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">投篮</div>
                    </div>
                    <div class="stat-box accuracy">
                        <div class="stat-value" id="statPct">0%</div>
                        <div class="stat-label">命中率</div>
                    </div>
                </div>
                <canvas id="pieChart" height="140"></canvas>
            </div>

            <!-- 投篮记录 -->
            <div class="shots-log-card">
                <h2>投篮记录</h2>
                <div id="shotsLog" class="shots-log"></div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button id="resetBtn" class="btn btn-secondary" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="1 4 1 10 7 10"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    重置
                </button>
                <button id="exportBtn" class="btn btn-secondary" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    导出
                </button>
            </div>
        </aside>
    </main>

    <!-- 热力图区域 -->
    <section class="court-section">
        <h2>投篮分布</h2>
        <canvas id="courtCanvas"></canvas>
    </section>

    <!-- 进球确认弹窗 -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-icon">
                <svg width="48" height="48" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#ff7a00"/>
                    <path d="M50 5 L50 95 M5 50 L95 50" stroke="#fff" stroke-width="3" fill="none"/>
                    <path d="M20 25 Q50 50 20 75" stroke="#fff" stroke-width="3" fill="none"/>
                    <path d="M80 25 Q50 50 80 75" stroke="#fff" stroke-width="3" fill="none"/>
                </svg>
            </div>
            <p class="modal-title">检测到一次投篮</p>
            <p class="modal-subtitle">请确认结果：</p>
            <div class="modal-buttons">
                <button id="btnConfirmHit" class="btn btn-hit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    命中
                </button>
                <button id="btnConfirmMiss" class="btn btn-miss">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                    未命中
                </button>
            </div>
        </div>
    </div>

    <!-- 帮助弹窗 -->
    <div id="helpModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>使用帮助</h2>
                <button class="modal-close" data-close="helpModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="help-section">
                    <h3>📷 使用步骤</h3>
                    <ol>
                        <li>点击「开启摄像头」或「上传视频」</li>
                        <li>点击「标记篮筐」在画面中点击篮筐位置</li>
                        <li>开始投篮，系统自动检测</li>
                        <li>确认投篮结果（命中/未命中）</li>
                    </ol>
                </div>
                <div class="help-section">
                    <h3>📱 手机使用</h3>
                    <p>建议部署到 Vercel/Netlify 获取 HTTPS 地址后使用</p>
                </div>
                <div class="help-section">
                    <h3>💡 建议</h3>
                    <ul>
                        <li>摄像头从侧面45度角拍摄</li>
                        <li>距离场地3-5米</li>
                        <li>确保光线充足</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/courtMapper.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/visualization.js"></script>
    <script src="js/detection.js"></script>
    <script src="js/shotAnalyzer.js"></script>
    <script src="js/videoProcessor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
